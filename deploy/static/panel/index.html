<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kosiro Panel</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div id="app">
    <section id="view-login" class="view hidden">
      <div class="login-card">
        <h1>Kosiro</h1>
        <p class="muted">Вход по admin key с установки</p>
        <input id="login-key" type="password" placeholder="A_R:SRV-…#……" autocomplete="off" />
        <button id="btn-login" class="btn primary">Войти</button>
        <p id="login-error" class="error hidden"></p>
      </div>
    </section>

    <section id="view-app" class="view hidden">
      <header class="topbar">
        <div class="brand">Kosiro Panel</div>
        <nav class="nav">
          <button data-page="dashboard" class="nav-btn active">Дашборд</button>
          <button data-page="users" class="nav-btn">Пользователи</button>
          <button data-page="protocols" class="nav-btn">Протоколы</button>
          <button data-page="settings" class="nav-btn">Настройки</button>
        </nav>
        <button id="btn-logout" class="btn ghost">Выход</button>
      </header>
      <div id="conn-banner" class="conn-banner hidden">
        <span>Нет связи с агентом (перезапуск или сеть).</span>
        <button id="btn-reconnect" class="btn small">Повторить</button>
      </div>

      <main class="content">
        <div id="page-dashboard" class="page">
          <h2>Обзор сервера</h2>
          <div id="metrics-grid" class="metrics-grid"></div>
          <div class="card">
            <h3>Нагрузка за сутки</h3>
            <canvas id="chart-cpu" height="120"></canvas>
          </div>
        </div>

        <div id="page-users" class="page hidden">
          <div class="row-between">
            <h2>Пользователи</h2>
            <button id="btn-add-user" class="btn primary">+ Пользователь</button>
          </div>
          <div id="users-list" class="list"></div>
        </div>

        <div id="page-protocols" class="page hidden">
          <div class="row-between">
            <h2>Протоколы</h2>
            <button id="btn-apply-protocols" class="btn primary">Применить все</button>
          </div>
          <p class="muted">Включите протокол, настройте параметры и нажмите «Применить».</p>
          <div id="protocols-mount"></div>
        </div>

        <div id="page-settings" class="page hidden">
          <h2>Настройки</h2>
          <div class="card form-card">
            <label>Публичный URL подписок</label>
            <input id="set-base-url" type="url" placeholder="https://your-vps:8443" />
            <label>Путь подписки</label>
            <input id="set-sub-path" type="text" value="/sub/" />
            <button id="btn-save-settings" class="btn primary">Сохранить</button>
          </div>
          <div class="card">
            <h3>Xray</h3>
            <label>Log level</label>
            <select id="set-xray-log">
              <option value="warning">warning</option>
              <option value="info">info</option>
              <option value="error">error</option>
            </select>
            <button id="btn-save-xray" class="btn">Сохранить Xray</button>
          </div>
        </div>
      </main>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn ghost">Отмена</button>
        <button id="modal-ok" class="btn primary">OK</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="assets/app.js"></script>
</body>
</html>
